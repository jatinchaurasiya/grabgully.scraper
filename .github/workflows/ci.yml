name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-control:
    name: Quality Control
    runs-on: ubuntu-latest
    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      # actions/checkout v4.2.2 (SHA-pinned for security + IDE resolution)
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── Python Setup ────────────────────────────────────────────────────────
      # actions/setup-python v5.6.0 (SHA-pinned)
      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Install Dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy
          pip install -r requirements.txt

      # ── Lint with Ruff ───────────────────────────────────────────────────────
      - name: Lint with Ruff
        run: ruff check --output-format=github .

      # ── Format Check with Black ──────────────────────────────────────────────
      - name: Format check with Black
        run: black --check .

      # ── Type Check with Mypy ─────────────────────────────────────────────────
      - name: Type check with Mypy
        run: mypy . --ignore-missing-imports || echo "Mypy found issues — non-blocking"

      # ── Run Tests ────────────────────────────────────────────────────────────
      - name: Run tests with Pytest
        run: |
          if [ -d "tests" ]; then
            pip install pytest pytest-asyncio
            pytest tests/ -v
          else
            echo "No tests/ directory — skipping pytest"
          fi
